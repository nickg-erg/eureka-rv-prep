<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ERG Recipe Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
      background: #111;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.25rem;
      gap: 2rem;
    }

    h1 {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
    }

    .brands {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 24rem;
    }

    a.brand {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 8rem;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      text-decoration: none;
      background: #1c1c1c;
      transition: filter 0.15s, transform 0.15s;
    }

    a.brand:hover  { filter: brightness(1.15); transform: translateY(-1px); }
    a.brand:active { filter: brightness(0.9);  transform: translateY(0); }

    a.brand img {
      display: block;
      max-width: 78%;
      height: calc(8rem - 2rem);
      width: auto;
      object-fit: contain;
    }

    .brand-eureka    { border: 2px solid #FF671D; }
    .brand-lapopular { border: 2px solid #C99D66; }
    .brand-amalfi    { border: 2px solid #910707; }

    footer {
      font-size: 0.65rem;
      color: #666;
      text-align: center;
      line-height: 1.7;
      max-width: 22rem;
    }
  </style>
</head>
<body>
  <h1>ERG Recipe Viewer</h1>

  <div class="brands">
    <a class="brand brand-eureka" href="eureka/">
      <img src="eureka/logo.svg" alt="Eureka" />
    </a>
    <a class="brand brand-lapopular" href="lapopular/">
      <img src="lapopular/logo.svg" alt="La Popular" />
    </a>
    <a class="brand brand-amalfi" href="amalfillama/">
      <img src="amalfillama/logo.svg" alt="Amalfi Llama" />
    </a>
  </div>

  <footer>
    Confidential &amp; Proprietary — Eureka Restaurant Group.<br>
    For internal use only. Do not distribute.
  </footer>
</body>
</html>
