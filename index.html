<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Eureka — Prep & Line Recipes</title>
  <meta name="description" content="Back-of-house recipe viewer for Eureka Restaurant Group" />
  <style>
    /* =========================================================================
       BRANDING — retune here. Drop the real Eureka orange + logo and you're done.
       ========================================================================= */
    :root{
      --eureka-orange:#FF671D;   /* Eureka brand orange */
      --ink:#161616;
      --ink-2:#202020;
      --ink-3:#3a3a3a;
      --hair:#6b6b6b;
      --paper:#efedea;
      --card:#ffffff;
      --note:#e2e0dc;
      --text:#171717;
      --text-soft:#565656;
      --nav-w:13rem;

      --mono:"Menlo","SF Mono","Roboto Mono","Consolas",monospace;
      --display:Helvetica,"Helvetica Neue",Arial,sans-serif;
    }

    *{box-sizing:border-box;}
    html,body{height:100%;}
    body{
      margin:0;padding:0;
      font-family:var(--display);
      background:var(--paper);
      color:var(--text);
      -webkit-text-size-adjust:100%;
      overflow:hidden;            /* page never scrolls; only lists/recipes do */
    }

    .app{
      display:grid;
      grid-template-columns:var(--nav-w) 1fr;
      height:100dvh;
    }

    /* ============================ A–Z ROLODEX ============================ */
    .az{
      background:var(--ink);
      display:flex;flex-direction:column;
      height:100dvh;
      user-select:none;
    }
    .az a{
      flex:1 1 0;
      display:flex;align-items:center;justify-content:center;gap:1.1rem;
      color:#fff;text-decoration:none;
      font-family:var(--mono);
      font-size:1.6rem;letter-spacing:.05em;text-transform:uppercase;
      border-bottom:1px solid #3a3a3a;
      transition:background .12s ease;
    }
    .az a:nth-child(2n){background:var(--ink-2);}
    .az a:active{background:var(--eureka-orange);}
    .az .brand{
      flex:0 0 auto;
      padding:1.1rem 1rem 1.3rem;
      background:var(--ink);
      display:flex;align-items:center;
    }
    .az .brand svg{width:100%;height:auto;max-width:8.5rem;display:block;}

    /* ============================== STAGE =============================== */
    .stage{position:relative;height:100dvh;overflow:hidden;}

    /* both list-panes and recipe-pages live here, shown via :target */
    .list,.recipe{
      position:absolute;inset:0;
      display:none;
      overflow-y:auto;-webkit-overflow-scrolling:touch;
    }
    .list:target{display:flex;flex-direction:column;}
    .recipe:target{display:block;}

    /* ----- letter list pane ----- */
    .list{padding:1rem 1.25rem 3rem;}
    .letter{
      font-family:var(--display);font-weight:900;text-transform:uppercase;
      font-size:1.4rem;margin:1.1rem 0 .35rem;
      border-left:4px solid var(--eureka-orange);padding-left:.5rem;
    }
    .letter:first-child{margin-top:.25rem;}
    .list a{
      display:block;width:fit-content;
      background:var(--card);color:var(--ink);text-decoration:none;
      border:1px solid #c9c9c9;border-left:3px solid var(--ink);
      font-size:1.35rem;padding:.7rem 1rem;margin:.4rem 0;
      transition:border-color .12s ease,transform .06s ease;
    }
    .list a:active{border-left-color:var(--eureka-orange);transform:translateX(2px);}

    /* ----- recipe page ----- */
    .recipe{padding:1.1rem 1.4rem 3rem;}
    .rhead{display:flex;align-items:baseline;justify-content:space-between;gap:1rem;
      border-bottom:2px solid var(--ink);padding-bottom:.4rem;margin-bottom:.8rem;}
    .rhead h1{
      font-family:var(--display);font-weight:900;letter-spacing:-.02em;
      font-size:2.5rem;margin:0;line-height:1.02;text-transform:capitalize;
    }
    .back{
      flex:0 0 auto;font-family:var(--mono);font-size:.95rem;
      color:var(--text-soft);text-decoration:none;border:1px solid #c9c9c9;
      padding:.4rem .7rem;border-radius:2px;white-space:nowrap;
    }
    .back:active{background:var(--eureka-orange);color:#fff;border-color:var(--eureka-orange);}

    .meta{display:grid;grid-template-columns:max-content 1fr;gap:.5rem 1.6rem;
      align-items:baseline;margin:.2rem 0 1.1rem;}
    .meta .lbl{font-family:var(--display);font-weight:800;font-size:1.12rem;color:var(--ink);
      border-left:4px solid var(--eureka-orange);padding-left:.55rem;line-height:1.15;}
    .meta .val{font-family:var(--display);color:var(--text);font-size:1.1rem;line-height:1.15;}
    .meta .val .tag{font-family:var(--mono);color:var(--text-soft);font-size:.92rem;margin-right:.15rem;}

    .note{background:var(--note);padding:.6rem .8rem;margin:0 0 1rem;max-width:64rem;}
    .note h3{margin:0 0 .2rem;font-size:1.05rem;}
    .note p{margin:.1rem 0;font-size:1.02rem;line-height:1.35;}

    .plate{font-family:var(--mono);font-size:.95rem;color:var(--eureka-orange);
      text-transform:uppercase;letter-spacing:.06em;margin:0 0 .6rem;}
    .dish-img{max-width:22rem;width:100%;border-radius:4px;margin:0 0 1rem;display:block;}

    table{width:100%;border-collapse:collapse;border:2px solid var(--ink-3);
      background:var(--card);max-width:78rem;}
    thead th{background:var(--ink-3);color:#fff;font-weight:800;
      font-size:.95rem;letter-spacing:.08em;padding:.5rem .8rem;text-align:left;border:1px solid #fff;}
    thead th.batch{text-align:center;}
    thead tr.sub th{background:var(--ink-2);font-family:var(--mono);font-weight:700;
      text-transform:lowercase;letter-spacing:0;padding:.3rem .8rem;font-size:.92rem;text-align:center;}
    thead tr.sub th .bx{font-family:var(--mono);font-weight:700;}
    thead tr.sub th .yld{display:block;font-family:var(--display);font-weight:400;
      text-transform:none;font-size:.78rem;color:#d2d2d2;margin-top:.12rem;letter-spacing:.01em;}
    tbody td{border:1px solid #b9b9b9;font-family:var(--display);font-size:1.05rem;
      padding:.5rem .65rem;vertical-align:top;line-height:1.34;}
    tbody tr:nth-child(even) td{background:#faf8f6;}
    td.ing{min-width:9rem;font-weight:600;}
    td.qty,td.uom{text-align:center;white-space:nowrap;font-family:var(--mono);}
    td.proc{width:48%;}
    td.proc ol{margin:0;padding-left:1.4rem;}
    td.proc li+li{margin-top:.7rem;}
    .proc-block{display:none;}  /* shown only on phones, where procedures move below the table */

    /* ============================ iPad mini landscape ============================ */
    @media (max-width:1100px){
      :root{--nav-w:11rem;}
      .az a{font-size:1.35rem;gap:.7rem;}
      .rhead h1{font-size:2rem;}
      tbody td{font-size:.95rem;}
    }
    /* ===== phone: full-height rolodex on top, document scrolls, tap jumps down ===== */
    @media (max-width:560px){
      html,body{height:auto;overflow:visible;}
      .app{display:block;height:auto;}

      /* rolodex fills the screen on load; content lives below it */
      .az{position:static;width:100%;height:100dvh;flex-direction:column;}
      .az a{font-size:1.5rem;}
      .az .brand{padding:1rem;}
      .az .brand svg{max-width:7rem;}

      .stage{position:static;height:auto;overflow:visible;display:block;}
      .list,.recipe{position:static;}
      .list{padding:1rem 1rem 2.5rem;}
      .recipe{padding:1rem 1rem 2.5rem;}
      .rhead h1{font-size:1.7rem;}

      .meta{gap:.4rem .9rem;margin:.2rem 0 1rem;}
      .meta .lbl{font-size:1rem;}
      .meta .val{font-size:1rem;}

      table{max-width:100%;}
      tbody td{font-size:.92rem;padding:.4rem .5rem;}
      td.ing{min-width:0;}
      td.proc,th.proc-h{display:none;}  /* whole procedures column leaves the table... */
      .proc-block{display:block;margin-top:1rem;background:#f3f1ee;
        border:1px solid #d9d6d2;padding:.75rem .85rem;}   /* ...and appear here */
      .proc-block h3{margin:0 0 .45rem;font-size:1rem;text-transform:uppercase;letter-spacing:.04em;
        border-left:4px solid var(--eureka-orange);padding-left:.5rem;}
      .proc-block ol{margin:0;padding-left:1.4rem;}
      .proc-block li{line-height:1.42;}
      .proc-block li+li{margin-top:.6rem;}
    }
  </style>
</head>
<body>
  <div class="app">
    <nav class="az" id="az"></nav>
    <main class="stage" id="stage"></main>
  </div>

  <script>
  /* ==========================================================================
     RECIPE DATA  —  this whole array is what Make.com regenerates from the
     Google Sheet on publish. Nothing below this block is touched by editors.
     Schema mirrors the agreed three Sheet tabs, joined by slug.
     ========================================================================== */
  /* RECIPES:START — Make regenerates everything between these two markers from the Google Sheet. */
  const RECIPES = [
    {

        {ingredient:"Honey",               qty_1x:"2",  qty_2x:"4",  uom:"tsp"},
        {ingredient:"Kosher Salt",         qty_1x:"1",  qty_2x:"2",  uom:"tsp"},
        {ingredient:"Lime Juice",          qty_1x:"2",  qty_2x:"4",  uom:"tsp"}

    /* ---- STACKED recipe reused to demo the NOTE box + OPTIONAL step alignment ---- */
    {
      slug:"caramelized-onions", name:"Caramelized Onions", concept:"Eureka", type:"prep",
      yield_1x:"1.5 lb", yield_2x:"3 lb", prep_time:"10 min.", shelf_life:"3 days",
      note:"Once onions are done, remove from heat and place on sheet tray to cool.\nDo not leave pot on stove as the pilot light will continue to cook and the onions will turn to mush.",
      ingredients:[
        {ingredient:"Yellow Onions, sliced 1/4\" then cut to 1\"", qty_1x:"2", qty_2x:"4", uom:"lbs", step_group:"A"},
        {ingredient:"Phase Butter",     qty_1x:"2", qty_2x:"4", uom:"oz",   step_group:"A"},
        {ingredient:"Kosher Salt",      qty_1x:"1", qty_2x:"2", uom:"tsp",  step_group:"A"},
        {ingredient:"Black Pepper",     qty_1x:"1", qty_2x:"2", uom:"tsp",  step_group:"A"},
        {ingredient:"Granulated Sugar", qty_1x:"1", qty_2x:"2", uom:"tbsp", step_group:"B"},

    {

      ingredients:[
        {ingredient:"AP Flour",                qty_1x:"4",   qty_2x:"8", uom:"cup"},
        {ingredient:"Potato Starch",           qty_1x:"2",   qty_2x:"4", uom:"cup"},

    {

        {ingredient:"Kosher Salt",           qty_1x:"1.5", qty_2x:"3",  uom:"cup"},
        {ingredient:"Ice",                   qty_1x:"2.5", qty_2x:"5",  uom:"gal"}
      ],
      steps:[

        {text:"Bring the stock pot up to a rolling boil, then turn off."},
        {text:"Add the ice and allow the brine to fully cool to below 40°."},

      ]
    },

    {
      slug:"chicken-strips", name:"Chicken Strips", concept:"Eureka", type:"prep",
      yield_1x:"20 ea", yield_2x:"40 ea", prep_time:"", shelf_life:"3 days",
      note:"",
      ingredients:[
        {ingredient:"PREP Brined Chicken", qty_1x:"5", qty_2x:"10", uom:"ea", ref:"chicken-brine"}
      ],
      steps:[
        {text:"Cut each chicken breast into 4 equal pieces."},
        {text:"Transfer to a labeled container and store in the walk-in until needed on the line."}
      ]
    }
  ];
  /* RECIPES:END */

  /* ==========================================================================
     RENDERER  —  builds the rolodex nav + every recipe page from RECIPES.
     Navigation itself is pure CSS :target, exactly like the original.
     ========================================================================== */
  const PAIRS = [["a","b"],["c","d"],["e","f"],["g","h"],["i","j"],["k","l"],
                 ["m","n"],["o","p"],["q","r"],["s","t"],["u","v"],["w","x","y","z"]];
  const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const groupIdFor = letter => { for(const p of PAIRS) if(p.includes(letter)) return "grp-"+p.join("-"); return "grp-w-x-y-z"; };
  const firstLetter = name => (name.trim()[0]||"#").toLowerCase();

  function recipeTable(r){
    const ings = r.ingredients||[], steps = r.steps||[];
    const isPrep = r.type==="prep";
    const aligned = ings.some(i=>i.step_group) && steps.some(s=>s.step_group);

    // header
    let head = `<thead><tr>
        <th>INGREDIENTS</th>
        ${isPrep ? `<th class="batch" colspan="2">QUANTITY</th><th class="batch">UOM</th>`
                 : `<th class="batch">QTY</th><th class="batch">UOM</th>`}
        <th class="proc-h">PROCEDURES</th></tr>`;
    if(isPrep) head += `<tr class="sub"><th></th>`+
      `<th><span class="bx">1x</span>${r.yield_1x?`<span class="yld">${esc(r.yield_1x)}</span>`:""}</th>`+
      `<th><span class="bx">2x</span>${r.yield_2x?`<span class="yld">${esc(r.yield_2x)}</span>`:""}</th>`+
      `<th></th><th class="proc-h"></th></tr>`;
    head += `</thead>`;

    // body
    const stepsHtml = (arr,start)=>`<ol${start>1?` start="${start}"`:""}>`+
        arr.map(s=>`<li>${esc(s.text)}</li>`).join("")+`</ol>`;
    const qtyCells = i => isPrep
        ? `<td class="qty">${esc(i.qty_1x)}</td><td class="qty">${esc(i.qty_2x)}</td><td class="uom">${esc(i.uom)}</td>`
        : `<td class="qty">${esc(i.qty_1x)}</td><td class="uom">${esc(i.uom)}</td>`;

    let body = "<tbody>";
    if(aligned){
      // group ingredient rows by step_group; procedures span each group, numbering continues
      const order=[]; const map={};
      ings.forEach(i=>{ const g=i.step_group||"_"; if(!map[g]){map[g]=[];order.push(g);} map[g].push(i); });
      let n=1;
      order.forEach(g=>{
        const rows=map[g]; const gsteps=steps.filter(s=>(s.step_group||"_")===g);
        rows.forEach((i,idx)=>{
          body += `<tr><td class="ing">${esc(i.ingredient)}</td>${qtyCells(i)}`;
          if(idx===0) body += `<td class="proc" rowspan="${rows.length}">${stepsHtml(gsteps,n)}</td>`;
          body += `</tr>`;
        });
        n += gsteps.length;
      });
    } else {
      // flat: one procedures cell spanning all ingredient rows
      ings.forEach((i,idx)=>{
        body += `<tr><td class="ing">${esc(i.ingredient)}</td>${qtyCells(i)}`;
        if(idx===0) body += `<td class="proc" rowspan="${ings.length}">${stepsHtml(steps,1)}</td>`;
        body += `</tr>`;
      });
    }
    body += "</tbody>";
    const procBlock = `<div class="proc-block"><h3>Procedures</h3>${stepsHtml(steps,1)}</div>`;
    return `<table>${head}${body}</table>${procBlock}`;
  }

  function recipePage(r){
    const isPrep = r.type==="prep";
    let meta = "";
    if(isPrep){
      const yieldVal = `<span class="tag">1x:</span> ${esc(r.yield_1x)}` +
                       (r.yield_2x?`&nbsp;&nbsp;<span class="tag">2x:</span> ${esc(r.yield_2x)}`:"");
      meta = `<div class="meta">
        ${r.prep_time?`<div class="lbl">Est. Prep Time</div><div class="val">${esc(r.prep_time)}</div>`:""}
        <div class="lbl">Shelf Life</div><div class="val">${esc(r.shelf_life)}</div>
        <div class="lbl">Yield</div><div class="val">${yieldVal}</div>
      </div>`;
    }
    const plate = (!isPrep && r.plate)?`<div class="plate">Plate: ${esc(r.plate)}</div>`:"";
    const img   = (!isPrep && r.image_url)?`<img class="dish-img" src="${esc(r.image_url)}" alt="${esc(r.name)}" />`:"";
    const note  = r.note?`<div class="note"><h3>Note:</h3>${r.note.split("\n").map(l=>`<p>${esc(l)}</p>`).join("")}</div>`:"";

    return `<article class="recipe" id="r-${esc(r.slug)}">
      <div class="rhead"><h1>${esc(r.name)}</h1>
        <a class="back" href="#${groupIdFor(firstLetter(r.name))}">‹ list</a></div>
      ${plate}${meta}${note}${img}
      ${recipeTable(r)}
    </article>`;
  }

  function build(){
    // sort recipes alphabetically by name
    const recipes = [...RECIPES].sort((a,b)=>a.name.localeCompare(b.name));

    // ---- A–Z nav ----
    const az = document.getElementById("az");
    az.innerHTML =
      PAIRS.map(p=>`<a href="#grp-${p.join("-")}">${p.map(l=>l.toUpperCase()).join("&nbsp;&nbsp;")}</a>`).join("") +
      `<div class="brand"><svg viewBox="0 0 800 193" xmlns="http://www.w3.org/2000/svg" aria-label="Eureka">
        <path d="M137.76 34.4489H39.4751V73.9495H129.697V106.263H39.4751V154.097H142.295V187.542H1.54761V1.50791H137.76V34.4489Z" fill="#fff"/>

    // ---- list panes (one per letter pair) ----
    const stage = document.getElementById("stage");
    let html = "";
    PAIRS.forEach(pair=>{
      const inGroup = recipes.filter(r=>pair.includes(firstLetter(r.name)));
      let inner = "";
      pair.forEach(letter=>{
        const forLetter = inGroup.filter(r=>firstLetter(r.name)===letter);
        if(forLetter.length){
          inner += `<div class="letter">${letter.toUpperCase()}</div>`;
          inner += forLetter.map(r=>`<a href="#r-${esc(r.slug)}">${esc(r.name)}</a>`).join("");
        }
      });
      html += `<section class="list" id="grp-${pair.join("-")}">${inner||""}</section>`;
    });

    // ---- recipe pages ----
    html += recipes.map(recipePage).join("");
    stage.insertAdjacentHTML("beforeend", html);

    // ---- default view: first populated letter group (desktop/tablet only) ----
    // On phones we leave the full rolodex showing on load, per the scroll-to-navigate model.
    if(!location.hash && window.matchMedia("(min-width:561px)").matches){
      const firstWithRecipes = PAIRS.find(p=>recipes.some(r=>p.includes(firstLetter(r.name))));
      if(firstWithRecipes) location.hash = "grp-"+firstWithRecipes.join("-");
    }
  }
  build();
  </script>
