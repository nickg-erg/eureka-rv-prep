name: Push to Apps Script

on:
  push:
    branches: [main]
    paths:
      - apps-script/recipe-viewer.gs
      - apps-script/appsscript.json

jobs:
  clasp-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write CLASP credentials
        run: echo '${{ secrets.CLASP_TOKEN }}' > ~/.clasprc.json

      - name: Write .clasp.json
        run: |
          echo '{"scriptId":"1jPYSvH1yfRKJupRVQP-PxP4rrmJLsAN98MenXTVkAGmiZmBVnIN4t-Yi","rootDir":"apps-script"}' > .clasp.json

      - name: Push to Apps Script
        run: clasp push --force
