<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>{{BRAND_NAME}} — Prep & Line Recipes</title>
  <meta name="description" content="Back-of-house recipe viewer for Eureka Restaurant Group" />
  <style>
    /* =========================================================================
       BRANDING — injected per brand at publish time. Do not hardcode brand values here.
       ========================================================================= */
    :root{
      --brand-primary:{{BRAND_PRIMARY}};   /* primary brand color */
      --brand-accent:{{BRAND_ACCENT}};     /* accent / secondary brand color */
      --ink:#161616;
      --ink-2:#202020;
      --ink-3:#3a3a3a;
      --hair:#6b6b6b;
      --paper:#efedea;
      --card:#ffffff;
      --note:#e2e0dc;
      --text:#171717;
      --text-soft:#565656;
      --nav-w:17rem;

      --mono:"Menlo","SF Mono","Roboto Mono","Consolas",monospace;
      --display:Helvetica,"Helvetica Neue",Arial,sans-serif;
    }

    *{box-sizing:border-box;}
    html,body{height:100%;}
    body{
      margin:0;padding:0;
      font-family:var(--display);
      background:var(--paper);
      color:var(--text);
      -webkit-text-size-adjust:100%;
      overflow:hidden;            /* page never scrolls; only lists/recipes do */
    }

    .app{
      display:grid;
      grid-template-columns:var(--nav-w) 1fr;
      height:100dvh;
    }

    /* ============================ LEFT NAV ============================ */
    .az{
      background:var(--ink);
      display:flex;flex-direction:column;
      height:100dvh;min-height:0;
      overflow-y:auto;-webkit-overflow-scrolling:touch;
      user-select:none;
    }
    .az .brand{
      flex:0 0 auto;
      position:sticky;top:0;z-index:2;
      padding:1rem 1rem .9rem;
      background:var(--ink);
      display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid #3a3a3a;
    }
    .az .brand svg{width:100%;height:auto;max-width:8.5rem;display:block;}
    .reload-btn{
      appearance:none;-webkit-appearance:none;flex:0 0 auto;
      background:transparent;border:1px solid rgba(255,255,255,.28);
      color:rgba(255,255,255,.7);border-radius:999px;
      width:2rem;height:2rem;
      display:flex;align-items:center;justify-content:center;
      font-size:1.15rem;cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .reload-btn:hover{border-color:rgba(255,255,255,.55);color:#fff;}
    .reload-btn:active{background:var(--brand-primary);border-color:var(--brand-primary);color:#fff;}

    /* A–Z jump strip (buttons; JS scrolls the list, no hash change) */
    .letterbar{
      flex:0 0 auto;
      display:grid;grid-template-columns:repeat(7,1fr);
      gap:1px;background:#3a3a3a;border-bottom:1px solid #3a3a3a;
    }
    .letterbar button{
      appearance:none;-webkit-appearance:none;border:0;cursor:pointer;
      background:var(--ink-2);color:#fff;
      font-family:var(--mono);font-size:.92rem;line-height:1;
      padding:.5rem 0;text-transform:uppercase;
      transition:background .12s ease;
    }
    .letterbar button:hover{background:#333;}
    .letterbar button:active{background:var(--brand-primary);}
    .letterbar button.empty{color:#5a5a5a;background:var(--ink);cursor:default;}

    /* scrolling recipe-link list */
    .navlist{
      flex:none;
      padding:0 0 2rem;
    }
    .navletter{
      position:sticky;top:0;z-index:1;
      background:var(--brand-accent);color:#fff;
      font-family:var(--mono);font-weight:700;font-size:.82rem;
      letter-spacing:.12em;text-transform:uppercase;
      padding:.22rem .9rem;scroll-margin-top:0;
      border-bottom:1px solid rgba(0,0,0,.18);
    }
    .navlist a{
      display:block;color:#e9e9e9;text-decoration:none;
      font-family:var(--display);font-size:1rem;line-height:1.25;
      padding:.5rem .9rem;border-bottom:1px solid #262626;
      transition:background .1s ease,color .1s ease;
    }
    .navlist a:hover{background:var(--ink-2);}
    .navlist a:active{background:var(--brand-primary);color:#fff;}
    .navlist a.current,.navlist a.current:hover{background:var(--brand-accent);color:#fff;}
    .nav-sub{display:block;font-family:var(--mono);font-size:.72rem;text-transform:uppercase;
      letter-spacing:.06em;line-height:1.3;margin-top:.12rem;opacity:.55;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .navlist.type-filtered .ns-type,.navlist.type-filtered .ns-sep{display:none;}
    .navlist.type-filtered .nav-sub--nocat{display:none;}

    /* type toggle bar (Prep / Menu) — above category chips */
    .typebar{flex:0 0 auto;display:grid;grid-template-columns:1fr 1fr;
      gap:1px;background:#3a3a3a;border-bottom:1px solid #3a3a3a;}
    .typebar button{appearance:none;-webkit-appearance:none;border:0;cursor:pointer;
      background:var(--ink-2);color:rgba(255,255,255,.55);
      font-family:var(--mono);font-size:.92rem;line-height:1;
      padding:.5rem 0;text-transform:uppercase;letter-spacing:.05em;
      transition:background .12s ease,color .12s ease;}
    .typebar button:hover{background:#333;color:#fff;}
    .typebar button.current{background:var(--brand-accent);color:#fff;}

    /* category filter chips */
    .catbar{flex:0 0 auto;display:flex;flex-wrap:wrap;gap:.3rem;padding:.5rem .6rem;
      background:var(--ink);border-bottom:1px solid #3a3a3a;}
    .catchip{appearance:none;-webkit-appearance:none;border:1px solid #4a4a4a;cursor:pointer;
      background:transparent;color:#cfcfcf;border-radius:999px;
      font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.04em;
      padding:.28rem .6rem;line-height:1;transition:background .12s ease,color .12s ease,border-color .12s ease;}
    .catchip:hover{background:var(--ink-2);color:#fff;}
    .catchip.current{background:var(--brand-accent);border-color:var(--brand-accent);color:#fff;}

    /* ============================== STAGE =============================== */
    .stage{position:relative;height:100dvh;overflow:hidden;}

    /* recipe pages live in the stage, shown via :target */
    .recipe{
      position:absolute;inset:0;
      display:none;background:var(--paper);
      overflow-y:auto;-webkit-overflow-scrolling:touch;
    }
    .recipe:target{display:block;}

    /* empty state before a recipe is picked */
    .placeholder{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      padding:2rem;text-align:center;
      color:var(--text-soft);font-size:1.2rem;
    }
    .stage:has(.recipe:target) .placeholder{display:none;}

    /* mobile-only floating back-to-list (hidden on desktop) */
    .totop{
      display:flex;align-items:center;gap:.35rem;
      position:fixed;right:.85rem;bottom:.85rem;z-index:50;
      background:var(--brand-primary);color:#fff;text-decoration:none;
      font-family:var(--display);font-weight:700;font-size:1rem;
      padding:.7rem 1.05rem;border-radius:999px;
      box-shadow:0 3px 12px rgba(0,0,0,.32);
    }

    /* ----- recipe page ----- */
    .recipe{padding:1.1rem 1.4rem 3rem;}
    .rhead{display:flex;align-items:baseline;justify-content:space-between;gap:1rem;
      border-bottom:2px solid var(--ink);padding-bottom:.4rem;margin-bottom:.8rem;}
    .rhead h1{
      font-family:var(--display);font-weight:900;letter-spacing:-.02em;
      font-size:2.5rem;margin:0;line-height:1.02;text-transform:capitalize;
    }
    .back{
      flex:0 0 auto;font-family:var(--mono);font-size:.95rem;
      color:var(--text-soft);text-decoration:none;border:1px solid #c9c9c9;
      padding:.4rem .7rem;border-radius:2px;white-space:nowrap;
    }
    .back:active{background:var(--brand-primary);color:#fff;border-color:var(--brand-primary);}

    .meta{display:grid;grid-template-columns:max-content 1fr;gap:.5rem 1.6rem;
      align-items:baseline;margin:.2rem 0 1.1rem;}
    .meta .lbl{font-family:var(--display);font-weight:800;font-size:1.12rem;color:var(--ink);
      border-left:3px solid var(--brand-accent);padding-left:.55rem;line-height:1.15;}
    .meta .val{font-family:var(--display);color:var(--text);font-size:1.1rem;line-height:1.15;}
    .meta .val .tag{font-family:var(--mono);color:var(--text-soft);font-size:.92rem;margin-right:.15rem;}
    .meta .val .ysep{display:inline-block;margin:0 .55rem;color:#c9c4be;font-weight:400;}
    .catpill{align-self:auto;flex:0 0 auto;font-family:var(--mono);font-size:.72rem;
      text-transform:uppercase;letter-spacing:.06em;color:#fff;background:var(--ink-2);
      padding:.25rem .6rem;border-radius:999px;white-space:nowrap;}
    .ilink{color:var(--brand-accent);text-decoration:underline;text-underline-offset:2px;text-decoration-thickness:1px;}
    .confid{margin-top:2.2rem;padding-top:.75rem;border-top:1px solid #d9d6d2;
      font-family:var(--mono);font-size:.7rem;letter-spacing:.04em;color:#9a948d;text-transform:uppercase;}

    .note{background:var(--note);padding:.6rem .8rem;margin:0 0 1rem;max-width:64rem;
      box-shadow: 3px 4px 5px -2px gray;}
    .note h3{margin:0 0 .2rem;font-size:1.05rem;}
    .note p{margin:.1rem 0;font-size:1.02rem;line-height:1.35;}

    .rpills{display:flex;flex-direction:column;align-items:flex-end;gap:.35rem;align-self:center;}
    .platepill{font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;
      color:#fff;background:var(--brand-primary);padding:.25rem .6rem;border-radius:999px;white-space:nowrap;}
    .dish-hero{width:100%;aspect-ratio:4/3;max-height:42vh;overflow:hidden;
      border-radius:4px;margin:0 0 1.1rem;}
    .dish-hero img{width:100%;height:100%;object-fit:cover;display:block;}

    table{width:100%;border-collapse:collapse;border:2px solid var(--ink-3);
      background:var(--card);max-width:78rem;}
    thead th{background:var(--ink-3);color:#fff;font-weight:800;
      font-size:.95rem;letter-spacing:.08em;padding:.5rem .8rem;text-align:left;border:1px solid #fff;}
    thead th.batch{text-align:center;}
    thead tr.sub th{background:var(--ink-2);font-family:var(--mono);font-weight:700;
      text-transform:lowercase;letter-spacing:0;padding:.3rem .8rem;font-size:.92rem;text-align:center;}
    thead tr.sub th .bx{font-family:var(--mono);font-weight:700;}
    thead tr.sub th .yld{display:block;font-family:var(--display);font-weight:400;
      text-transform:none;font-size:.78rem;color:#d2d2d2;margin-top:.12rem;letter-spacing:.01em;}
    tbody td{border:1px solid #b9b9b9;font-family:var(--display);font-size:1.05rem;
      padding:.5rem .65rem;vertical-align:middle;line-height:1.34;}
    tbody tr:nth-child(even) td{background:#faf8f6;}
    td.ing{min-width:9rem;font-weight:600;}
    td.qty,td.uom{text-align:center;white-space:nowrap;font-family:var(--mono);}
    td.proc{width:48%;}
    td.proc ol{margin:0;padding-left:1.4rem;}
    td.proc li+li{margin-top:.7rem;}
    .proc-block{display:none;}  /* shown only on phones, where procedures move below the table */

    /* ============================ iPad mini landscape ============================ */
    @media (max-width:1100px){
      :root{--nav-w:14rem;}
      .letterbar button{font-size:.82rem;padding:.45rem 0;}
      .navlist a{font-size:.95rem;}
      .rhead h1{font-size:2rem;}
      tbody td{font-size:.95rem;}
    }
    /* ===== phone: full nav list on top, document scrolls, tap a recipe to jump down ===== */
    @media (max-width:560px){
      html,body{height:auto;overflow:visible;}
      .app{display:block;height:auto;}

      .az{position:static;width:100%;height:auto;}
      .navlist{flex:none;height:auto;overflow:visible;
        min-height:calc(100dvh - 9rem);}      /* list fills the first screen on load */
      .navlist a{font-size:1.1rem;padding:.65rem .9rem;}
      .letterbar button{font-size:1rem;padding:.55rem 0;}

      .stage{position:static;height:auto;overflow:visible;display:block;}
      .recipe{position:static;}
      .recipe{padding:1rem 1rem 4rem;}
      .placeholder{display:none;}            /* no empty state on phone — the nav is the screen */
      .rhead h1{font-size:1.7rem;}
      .rhead{flex-direction:column;align-items:flex-start;gap:.45rem;}
      .rpills{align-items:flex-start;align-self:flex-start;width:100%;}
      .rpills .catpill,.rpills .platepill{align-self:flex-start;}
      .platepill{white-space:normal;}

      .meta{gap:.4rem .9rem;margin:.2rem 0 1rem;}
      .meta .lbl{font-size:1rem;}
      .meta .val{font-size:1rem;}

      table{max-width:100%;}
      tbody td{font-size:.92rem;padding:.4rem .5rem;}
      td.ing{min-width:0;}
      td.proc,th.proc-h{display:none;}       /* whole procedures column leaves the table... */
      .proc-block{display:block;margin-top:1rem;background:var(--card);
        border:1px solid #d9d6d2;padding:.75rem .85rem;}   /* ...and appears here */
      .proc-block h3{margin:0 0 .45rem;font-size:1rem;text-transform:uppercase;letter-spacing:.04em;
        border-left:3px solid var(--brand-primary);padding-left:.5rem;}
      .proc-block ol{margin:0;padding-left:1.4rem;}
      .proc-block li{line-height:1.42;}
      .proc-block li+li{margin-top:.6rem;}

    }
  </style>
</head>
<body>
  <div class="app">
    <nav class="az" id="az"></nav>
    <main class="stage" id="stage">
      <div class="placeholder">‹ Pick a recipe from the list</div>
    </main>
  </div>
  <a class="totop" href="#nav-top">▲</a>

  <script>
  /* ==========================================================================
     RECIPE DATA  —  this whole array is what Make.com regenerates from the
     Google Sheet on publish. Nothing below this block is touched by editors.
     Schema mirrors the agreed three Sheet tabs, joined by slug.
     ========================================================================== */
  /* RECIPES:START — the publisher replaces everything between these two markers with this brand's recipes. */
  const RECIPES = [ /* {{RECIPES_JSON}} */ ];
  /* RECIPES:END */

  /* ==========================================================================
     RENDERER  —  builds the rolodex nav + every recipe page from RECIPES.
     Navigation itself is pure CSS :target, exactly like the original.
     ========================================================================== */
  const PAIRS = [["a","b"],["c","d"],["e","f"],["g","h"],["i","j"],["k","l"],
                 ["m","n"],["o","p"],["q","r"],["s","t"],["u","v"],["w","x","y","z"]];
  const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const groupIdFor = letter => { for(const p of PAIRS) if(p.includes(letter)) return "grp-"+p.join("-"); return "grp-w-x-y-z"; };
  const firstLetter = name => (name.trim()[0]||"#").toLowerCase();
  let SLUGS = new Set();   // recipe slugs, for ingredient→recipe links

  function recipeTable(r){
    const ings = r.ingredients||[], steps = r.steps||[];
    const isPrep = r.type==="prep";
    const aligned = ings.some(i=>i.step_group) && steps.some(s=>s.step_group);
    const hasQty  = isPrep || ings.some(i=>i.qty_1x!=null && i.qty_1x!=="");

    // header
    let head = `<thead><tr>
        <th>INGREDIENTS</th>
        ${isPrep ? `<th class="batch" colspan="2">QUANTITY</th><th class="batch">UOM</th>`
                 : hasQty ? `<th class="batch">QTY</th><th class="batch">UOM</th>`
                           : `<th class="batch">UOM</th>`}
        <th class="proc-h">PROCEDURES</th></tr>`;
    if(isPrep) head += `<tr class="sub"><th></th>`+
      `<th><span class="bx">1x</span>${r.yield_1x?`<span class="yld">${esc(r.yield_1x)}</span>`:""}</th>`+
      `<th><span class="bx">2x</span>${r.yield_2x?`<span class="yld">${esc(r.yield_2x)}</span>`:""}</th>`+
      `<th></th><th class="proc-h"></th></tr>`;
    head += `</thead>`;

    // body
    const stepsHtml = (arr,start)=>`<ol${start>1?` start="${start}"`:""}>`+
        arr.map(s=>`<li>${esc(s.text)}</li>`).join("")+`</ol>`;
    const qtyCells = i => isPrep
        ? `<td class="qty">${esc(i.qty_1x)}</td><td class="qty">${esc(i.qty_2x)}</td><td class="uom">${esc(i.uom)}</td>`
        : hasQty ? `<td class="qty">${esc(i.qty_1x)}</td><td class="uom">${esc(i.uom||i.qty_2x)}</td>`
                 : `<td class="uom">${esc(i.uom||i.qty_2x)}</td>`;
    const ingCell = i => {
        const linked = i.links_to && SLUGS.has(i.links_to);
        const inner = linked ? `<a class="ilink" href="#r-${esc(i.links_to)}">${esc(i.ingredient)}</a>` : esc(i.ingredient);
        return `<td class="ing">${inner}</td>`;
    };

    let body = "<tbody>";
    if(aligned){
      // group ingredient rows by step_group; procedures span each group, numbering continues
      const order=[]; const map={};
      ings.forEach(i=>{ const g=i.step_group||"_"; if(!map[g]){map[g]=[];order.push(g);} map[g].push(i); });
      let n=1;
      order.forEach(g=>{
        const rows=map[g]; const gsteps=steps.filter(s=>(s.step_group||"_")===g);
        rows.forEach((i,idx)=>{
          body += `<tr>${ingCell(i)}${qtyCells(i)}`;
          if(idx===0) body += `<td class="proc" rowspan="${rows.length}">${stepsHtml(gsteps,n)}</td>`;
          body += `</tr>`;
        });
        n += gsteps.length;
      });
    } else {
      // flat: one procedures cell spanning all ingredient rows
      ings.forEach((i,idx)=>{
        body += `<tr>${ingCell(i)}${qtyCells(i)}`;
        if(idx===0) body += `<td class="proc" rowspan="${ings.length}">${stepsHtml(steps,1)}</td>`;
        body += `</tr>`;
      });
    }
    body += "</tbody>";
    const procBlock = `<div class="proc-block"><h3>Procedures</h3>${stepsHtml(steps,1)}</div>`;
    return `<table>${head}${body}</table>${procBlock}`;
  }

  function recipePage(r){
    const isPrep = r.type==="prep";
    let meta = "";
    if(isPrep){
      const yieldVal = `<span class="tag">1x:</span> ${esc(r.yield_1x)}` +
                       (r.yield_2x?`<span class="ysep">|</span><span class="tag">2x:</span> ${esc(r.yield_2x)}`:"");
      meta = `<div class="meta">
        ${r.prep_time?`<div class="lbl">Est. Prep Time</div><div class="val">${esc(r.prep_time)}</div>`:""}
        <div class="lbl">Shelf Life</div><div class="val">${esc(r.shelf_life)}</div>
        <div class="lbl">Yield</div><div class="val">${yieldVal}</div>
      </div>`;
    }
    const hero  = (r.type==='plate') ? `<div class="dish-hero" style="display:none"><img data-src="images/${esc(r.slug)}.jpg" alt="${esc(r.name)}" decoding="async"></div>` : '';
    const note  = r.note?`<div class="note"><h3>Note:</h3>${r.note.split("\n").map(l=>`<p>${esc(l)}</p>`).join("")}</div>`:"";
    const catPill    = r.category?`<span class="catpill">${esc(r.category)}</span>`:"";
    const platePill  = (!isPrep && r.plate)?`<span class="platepill">PLATE: ${esc(r.plate)}</span>`:"";
    const pillsDiv   = (catPill||platePill)?`<div class="rpills">${catPill}${platePill}</div>`:"";

    return `<article class="recipe" id="r-${esc(r.slug)}">
      ${hero}<div class="rhead"><h1>${esc(r.name)}</h1>${pillsDiv}</div>
      ${meta}${note}
      ${recipeTable(r)}
      <p class="confid">CONFIDENTIAL — Property of Eureka Restaurant Group. Internal kitchen use only; not for distribution.</p>
    </article>`;
  }

  function build(){
    // sort recipes alphabetically by name
    const recipes = [...RECIPES].sort((a,b)=>a.name.localeCompare(b.name));

    // ---- A–Z nav ----
    const az = document.getElementById("az");
    const present = new Set(recipes.map(r=>firstLetter(r.name)));
    const ALPHA = "abcdefghijklmnopqrstuvwxyz".split("");
    SLUGS = new Set(recipes.map(r=>r.slug));
    const bar = `<div class="letterbar">` + ALPHA.map(l=>
        present.has(l) ? `<button data-jump="${l}">${l.toUpperCase()}</button>`
                       : `<button class="empty" disabled>${l.toUpperCase()}</button>`).join("") + `</div>`;
    // subline below each nav/search row
    function buildNavSub(r){
      const type = (r.type||"").toUpperCase();
      const cat  = (r.category||"").toUpperCase();
      if(!type && !cat) return "";
      if(!cat) return `<span class="nav-sub nav-sub--nocat"><span class="ns-type">${esc(type)}</span></span>`;
      if(!type) return `<span class="nav-sub">${esc(cat)}</span>`;
      return `<span class="nav-sub"><span class="ns-type">${esc(type)}</span><span class="ns-sep"> · </span>${esc(cat)}</span>`;
    }

    // type toggle bar
    const typebar = `<div class="typebar" id="typebar">` +
      `<button data-type="prep">Prep</button>` +
      `<button data-type="plate">Plate</button>` +
      `</div>`;
    // category filter chips (from the Recipes-tab category column)
    const cats = [...new Set(recipes.map(r=>r.category).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
    const chips = `<div class="catbar"><button class="catchip current" data-cat="*">All</button>` +
        cats.map(c=>`<button class="catchip" data-cat="${esc(c)}">${esc(c)}</button>`).join("") + `</div>`;
    let nlist = `<div class="navlist" id="navlist">`;
    ALPHA.forEach(l=>{
      const forLetter = recipes.filter(r=>firstLetter(r.name)===l);
      if(!forLetter.length) return;
      nlist += `<div class="navgroup" id="nav-${l}"><div class="navletter">${l.toUpperCase()}</div>` +
               forLetter.map(r=>`<a href="#r-${esc(r.slug)}" id="lnk-${esc(r.slug)}" data-cat="${esc(r.category||"")}" data-type="${esc(r.type||"")}">${esc(r.name)}${buildNavSub(r)}</a>`).join("") +
               `</div>`;
    });
    nlist += `</div>`;
    az.innerHTML =
      `<div class="brand" id="nav-top">{{BRAND_LOGO_SVG}}<button class="reload-btn" onclick="safeReload()" title="Reload" aria-label="Reload page">↻</button></div>` + typebar + chips + bar + nlist;

    // ---- recipe pages into the stage (after the placeholder) ----
    const stage = document.getElementById("stage");
    stage.insertAdjacentHTML("beforeend", recipes.map(recipePage).join(""));

    // ---- plate photo heroes: lazy-load only when that recipe is navigated to ----
    function loadHeroForHash(){
      const m = location.hash.match(/^#r-(.+)$/);
      if(!m) return;
      const article = document.getElementById('r-'+m[1]);
      if(!article) return;
      const img = article.querySelector('.dish-hero img[data-src]');
      if(!img) return;
      const hero = img.parentElement;
      img.src = img.dataset.src;
      img.removeAttribute('data-src');
      if(img.complete){ if(img.naturalWidth) hero.style.display=''; }
      else {
        img.addEventListener('load',  ()=>{ hero.style.display=''; },    {once:true});
        img.addEventListener('error', ()=>{ hero.style.display='none'; }, {once:true});
      }
    }
    window.addEventListener('hashchange', loadHeroForHash);
    loadHeroForHash();

    // ---- letter strip: scroll the rail only; the open recipe (a #r- :target) is left untouched ----
    document.querySelector(".letterbar").addEventListener("click", e=>{
      const b = e.target.closest("button[data-jump]"); if(!b) return;
      const sec = document.getElementById("nav-"+b.dataset.jump);
      if(sec) sec.scrollIntoView({block:"start"});
    });

    // ---- combined filter (type toggle + category chips) ----
    const navlistEl = document.getElementById("navlist");
    let activeType = null;   // null = no type filter
    let activeCat  = "*";    // "*"  = all categories

    function applyFilters(){
      navlistEl.classList.toggle("type-filtered", activeType !== null);

      // track which cats and letters have at least one visible result
      const liveCats = new Set();
      const liveLetters = new Set();

      navlistEl.querySelectorAll(".navgroup").forEach(g=>{
        let shown = 0;
        g.querySelectorAll("a").forEach(a=>{
          const typeOk = !activeType || a.dataset.type===activeType;
          const catOk  = activeCat==="*" || a.dataset.cat===activeCat;
          const on = typeOk && catOk;
          if(on){
            if(a.dataset.cat) liveCats.add(a.dataset.cat);
            const letterEl = g.querySelector(".navletter");
            if(letterEl) liveLetters.add(letterEl.textContent.trim());
          }
          a.style.display = on ? "" : "none";
          if(on) shown++;
        });
        g.style.display = shown ? "" : "none";
      });

      // dim category chips that have no results under current type filter
      document.querySelectorAll(".catchip").forEach(chip=>{
        if(chip.dataset.cat==="*") return; // All chip always active
        const hasResults = liveCats.has(chip.dataset.cat);
        chip.disabled = !hasResults;
        chip.style.opacity = hasResults ? "" : "0.3";
        chip.style.pointerEvents = hasResults ? "" : "none";
        // if currently selected chip becomes empty, revert to All
        if(!hasResults && chip.classList.contains("current")){
          chip.classList.remove("current");
          document.querySelector(".catchip[data-cat='*']").classList.add("current");
          activeCat = "*";
        }
      });

      // dim A-Z letter headers that have no results
      navlistEl.querySelectorAll(".navletter").forEach(el=>{
        const hasResults = liveLetters.has(el.textContent.trim());
        el.style.opacity = hasResults ? "" : "0.25";
      });

      // dim/disable letterbar jump buttons that have no results
      document.querySelectorAll(".letterbar button[data-jump]").forEach(btn=>{
        const hasResults = liveLetters.has(btn.dataset.jump.toUpperCase());
        btn.disabled = !hasResults;
        btn.style.opacity = hasResults ? "" : "0.25";
      });
    }

    document.getElementById("typebar").addEventListener("click", e=>{
      const b = e.target.closest("button[data-type]"); if(!b) return;
      if(activeType===b.dataset.type){
        activeType = null;           // tap active button → deselect
        b.classList.remove("current");
      } else {
        document.querySelectorAll(".typebar button.current").forEach(x=>x.classList.remove("current"));
        activeType = b.dataset.type;
        b.classList.add("current");
      }
      applyFilters();
    });

    document.querySelector(".catbar").addEventListener("click", e=>{
      const b = e.target.closest(".catchip"); if(!b) return;
      const alreadyActive = b.classList.contains("current");
      document.querySelectorAll(".catchip.current").forEach(c=>c.classList.remove("current"));
      if(!alreadyActive || b.dataset.cat==="*"){
        b.classList.add("current");
        activeCat = b.dataset.cat;
      } else {
        // deselect: revert to All
        document.querySelector(".catchip[data-cat='*']").classList.add("current");
        activeCat = "*";
      }
      applyFilters();
    });

    // ---- highlight the open recipe in the rail (class only — NO scrolling; that was the old phone bug) ----
    function syncCurrent(){
      document.querySelectorAll(".navlist a.current").forEach(a=>a.classList.remove("current"));
      const m = location.hash.match(/^#r-(.+)$/);
      if(m){ const a = document.getElementById("lnk-"+m[1]); if(a) a.classList.add("current"); }
    }
    window.addEventListener("hashchange", syncCurrent);
    syncCurrent();
  }
  function safeReload(){
    if(navigator.onLine){ window.location.reload(); }
  }

  document.querySelector('.totop').addEventListener('click', ()=>{
    const az = document.getElementById('az');
    if(az) az.scrollTo({top:0, behavior:'smooth'});
  });

  build();
  </script>
</body>
</html>
